    <!-- Google Analytics - deferred to reduce main-thread impact -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("consent", "default", {
        analytics_storage: "denied",
        ad_storage: "denied",
      });
      var gaLoaded = false;
      function isAnalyticsAllowed() {
        try {
          var consent = localStorage.getItem("invision-cookie-consent");
          if (!consent) return false;
          var prefsRaw = localStorage.getItem("invision-cookie-preferences");
          if (!prefsRaw) return false;
          var prefs = JSON.parse(prefsRaw);
          return !!prefs.analytics;
        } catch (e) {
          return false;
        }
      }
      function loadGA() {
        if (gaLoaded || !isAnalyticsAllowed()) return;
        gaLoaded = true;
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=G-B1MKM2FPV7";
        document.head.appendChild(s);
        gtag("consent", "update", {
          analytics_storage: "granted",
          ad_storage: "denied",
        });
        gtag("js", new Date());
        gtag("config", "G-B1MKM2FPV7", { send_page_view: false });
      }
      function scheduleLoadGA() {
        if (gaLoaded) return;
        if ("requestIdleCallback" in window) {
          requestIdleCallback(loadGA, { timeout: 4000 });
        } else {
          setTimeout(loadGA, 2000);
        }
      }
      if (isAnalyticsAllowed()) {
        scheduleLoadGA();
      }
      window.addEventListener("cookie-consent-updated", function () {
        scheduleLoadGA();
      });
    </script>

    <script>

      if ('fonts' in document) {
        Promise.all([
          document.fonts.load('400 1rem Rubik'),
          document.fonts.load('600 1rem Rubik'),
          document.fonts.load('700 1rem Rubik')
        ]).then(function() {
          document.documentElement.classList.add('fonts-loaded');
        }).catch(function() {
          // Fallback if font loading fails
          document.documentElement.classList.add('fonts-loaded');
        });

        // Timeout fallback
        setTimeout(function() {
          document.documentElement.classList.add('fonts-loaded');
        }, 1500);
      } else {
        // Browsers without Font Loading API
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>
